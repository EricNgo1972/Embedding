name: Release Container

# Builds a container image for the Embedding Service and pushes it to GHCR, for the provisioning
# system (spc-provision) to `docker pull` + `docker run` per tenant. Mirrors the other MapleKiosk
# apps (e.g. MemberList) but, being a self-contained Python service, builds straight from source
# with no sibling-repo checkout.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version / image tag (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/ericngo1972/embedding   # GHCR image names must be lowercase

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -t "$IMAGE:${{ inputs.version }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ inputs.version }}"
          docker push "$IMAGE:latest"

      - name: Summary
        run: |
          echo "Pushed $IMAGE:${{ inputs.version }} and $IMAGE:latest" >> "$GITHUB_STEP_SUMMARY"
          echo "Catalog row -> ImageRepository=$IMAGE, ImageTag=${{ inputs.version }}, InternalPort=8080" >> "$GITHUB_STEP_SUMMARY"
          echo "Required env at run: EMBED_API_KEY" >> "$GITHUB_STEP_SUMMARY"
